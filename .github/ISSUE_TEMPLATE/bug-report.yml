name: Bug report
description: Something on the site is broken.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: "iPhone 14, Safari 17 / Chrome 130 on macOS"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
